{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-6 text-center">
        <div style="font-size: 5rem; color: var(--danger-color); margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        
        <h1 class="display-1" style="color: var(--danger-color); font-weight: bold;">404</h1>
        <h2 class="mb-3">Page Not Found</h2>
        
        <p class="lead text-muted mb-4">
            Sorry! The page you're looking for doesn't exist or has been moved.
        </p>
        
        <div class="alert alert-warning" role="alert">
            <i class="fas fa-info-circle"></i>
            <strong>Error:</strong> The requested URL was not found on this server.
        </div>
        
        <div class="mt-4">
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg me-2">
                <i class="fas fa-home"></i> Go to Dashboard
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary btn-lg">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
