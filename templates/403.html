{% extends "base.html" %}

{% block title %}403 - Access Forbidden{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-6 text-center">
        <div style="font-size: 5rem; color: var(--warning-color); margin-bottom: 20px;">
            <i class="fas fa-ban"></i>
        </div>
        
        <h1 class="display-1" style="color: var(--warning-color); font-weight: bold;">403</h1>
        <h2 class="mb-3">Access Forbidden</h2>
        
        <p class="lead text-muted mb-4">
            You don't have permission to access this resource.
        </p>
        
        <div class="alert alert-warning" role="alert">
            <i class="fas fa-lock"></i>
            <strong>Error:</strong> Access to this page is restricted.
        </div>
        
        <div class="mt-4">
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg me-2">
                <i class="fas fa-home"></i> Go to Dashboard
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary btn-lg">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
